version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: condominio_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-condominio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-condominio_password}
      POSTGRES_DB: ${DB_NAME:-condominio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-condominio_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condominio_network

  # pgAdmin (database GUI - optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: condominio_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@condominio.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - condominio_network
    profiles:
      - dev  # Only start with: docker-compose --profile dev up

  # Redis (for caching, sessions, optional)
  redis:
    image: redis:7-alpine
    container_name: condominio_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - condominio_network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  condominio_network:
    driver: bridge
